<!DOCTYPE html>
<html>

<head>

    <title>Admin Panel</title>

    <link rel="stylesheet"
          href="admin.css">

</head>

<body>

    <div class="admin-container">

        <h1>👨‍💻 Admin Panel</h1>

        <input type="text"
               id="question"
               placeholder="Enter Question">

        <input type="text"
               id="option1"
               placeholder="Option 1">

        <input type="text"
               id="option2"
               placeholder="Option 2">

        <input type="text"
               id="option3"
               placeholder="Option 3">

        <input type="text"
               id="option4"
               placeholder="Option 4">

        <input type="text"
               id="answer"
               placeholder="Correct Answer">

        <button onclick="addQuestion()">
            Add Question
        </button>

        <h2 id="message"></h2>
        <div id="question-list"></div>

    </div>

    <script src="admin.js"></script>

</body>

</html>
